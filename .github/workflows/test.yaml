name: Runner PoC
on:
  workflow_dispatch:
    inputs:
      site:
        description: 'Dropdown — pick a known URL'
        type: choice
        required: true
        default: 'https://playwright.dev'
        options:
          - 'https://playwright.dev'
          - 'https://example.com'
          - 'https://www.google.com'
      custom_url:
        description: 'Text box — paste any URL (overrides dropdown)'
        type: string
        default: ''
      full_suite:
        description: 'Checkbox — run all tests?'
        type: boolean
        default: false
      retries:
        description: 'Number — how many retries'
        type: number
        default: 0
      target_env:
        description: 'Environment picker'
        type: environment
        required: false
jobs:
  test:
    runs-on: [self-hosted, linux, homelab]
    steps:
      - uses: actions/checkout@v4
      - run: npm install
      - run: npx playwright install chromium
      - name: Show what was selected
        run: |
          echo "Dropdown site:   ${{ inputs.site }}"
          echo "Custom URL:      ${{ inputs.custom_url }}"
          echo "Full suite:      ${{ inputs.full_suite }}"
          echo "Retries:         ${{ inputs.retries }}"
          echo "Environment:     ${{ inputs.target_env }}"
      - run: npx playwright test
        env:
          TARGET_URL: ${{ inputs.custom_url != '' && inputs.custom_url || inputs.site }}
      - name: Archive report to results history
        if: ${{ !cancelled() }}
        run: |
          RUN="$(date +%Y-%m-%d_%H-%M-%S)_${{ github.run_number }}"
          DEST="$HOME/test-results/$RUN"
          mkdir -p "$DEST"
          cp -r playwright-report/* "$DEST"/ 2>/dev/null || true
          echo "Archived to $DEST"
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14